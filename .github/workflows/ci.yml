name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  docker-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: sushiibot/sushii-workflows/.github/workflows/docker-build.yml@main
    with:
      image_name: ghcr.io/sushiibot/sushii-agent
    permissions:
      contents: read
      packages: write
