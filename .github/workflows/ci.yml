name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  docker-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: sushiibot/sushii-workflows/.github/workflows/docker-build.yml@main
    with:
      image_name: ghcr.io/sushiibot/sushii-agent
    permissions:
      contents: read
      packages: write

  deploy:
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: sushiibot/sushii-workflows/.github/workflows/deploy.yml@main
    with:
      service: private-bots/sushii-agent
      image_version: ${{ needs.docker-build.outputs.image_version }}
      host: apps
    secrets:
      ANSIBLE_REPO_TOKEN: ${{ secrets.ANSIBLE_REPO_TOKEN }}
      ANSIBLE_SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
      ANSIBLE_KNOWN_HOSTS: ${{ secrets.ANSIBLE_KNOWN_HOSTS }}
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
